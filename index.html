<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>虛源靈流 — V.O.F. 宇宙一體場域</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Noto Sans TC', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .card-blur {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .glow { box-shadow: 0 0 60px rgba(6,182,212,0.15); }
        .gradient-text {
            background: linear-gradient(135deg,#06b6d4,#818cf8,#e879f9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 20s linear infinite; }
        body { background: #09090b; color: #e4e4e7; }
        .grid-bg {
            background-image: linear-gradient(rgba(6,182,212,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(6,182,212,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        /* SpiritFlow 側邊欄樣式 */
        :root { --main: #00f2ff; --bg: #030303; --border: rgba(0, 242, 255, 0.2); }
        #star-canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .sidebar {
            width: 260px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: 0.3s;
            z-index: 1002;
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
        }
        .menu-item {
            padding: 20px 30px;
            cursor: pointer;
            color: #555;
            font-size: 0.9rem;
            letter-spacing: 2px;
            border-left: 3px solid transparent;
            transition: all 0.3s;
        }
        .menu-item:hover, .menu-item.active {
            color: var(--main);
            background: rgba(0,242,255,0.05);
            border-left-color: var(--main);
        }
        .main-content {
            margin-left: 260px;
            min-height: 100vh;
        }
        .view { flex: 1; display: flex; flex-direction: column; position: relative; }
        header {
            padding: 20px 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }
        #scroll-content { flex: 1; overflow-y: auto; padding: 40px; scroll-behavior: smooth; }
        .content-body { max-width: 900px; margin: 0 auto; line-height: 2.2; white-space: pre-wrap; font-size: 1.1rem; }
        @media (max-width: 768px) {
            .sidebar { left: -260px; }
            .sidebar.open { left: 0; }
            .main-content { margin-left: 0; }
        }
        /* AI 模組樣式 */
        .ai-button {
            background: linear-gradient(135deg, #06b6d4, #818cf8);
            padding: 20px 40px;
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.1rem;
        }
        .ai-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(6,182,212,0.4);
        }
        .ai-result {
            border: 1px solid var(--main);
            padding: 30px;
            margin-top: 20px;
            border-radius: 8px;
            background: rgba(0,242,255,0.05);
            font-size: 1.2rem;
            line-height: 2;
        }
        .spectrum-item {
            cursor: pointer;
            padding: 15px;
            border-bottom: 1px solid #111;
            transition: all 0.3s;
        }
        .spectrum-item:hover {
            background: rgba(0,242,255,0.1);
            padding-left: 25px;
        }
    </style>
</head>
<body class="antialiased">
    <!-- 星空背景 -->
    <canvas id="star-canvas"></canvas>

    <!-- 側邊選單 -->
    <nav class="sidebar" id="nav">
        <div style="padding:40px 20px; text-align:center; color:var(--main); letter-spacing:5px; font-size:1.2rem; font-weight:bold;">
            虛源靈流
        </div>
        <div class="menu-item active" onclick="sw('hero')">◇ 宇宙場域</div>
        <div class="menu-item" onclick="sw('ontology')">◇ 一體本體論</div>
        <div class="menu-item" onclick="sw('algorithm')">◇ 四筆法演算法</div>
        <div class="menu-item" onclick="sw('healing')">◇ 療癒系統</div>
        <div class="menu-item" onclick="sw('kernel')">◇ 決策引擎</div>
        <div style="border-top:1px solid var(--border); margin:10px 0;"></div>
        <div class="menu-item" onclick="sw('oracle')">◈ 答案之書 (AI)</div>
        <div class="menu-item" onclick="sw('tarot')">◈ 靈流塔羅 (AI)</div>
        <div class="menu-item" onclick="sw('daily')">◈ 今日建議 (AI)</div>
        <div class="menu-item" onclick="sw('diagnosis')">◈ 命運診斷 (AI)</div>
        <div class="menu-item" onclick="sw('spectrum')">◈ 靈流光譜</div>
    </nav>

    <!-- 主內容區 -->
    <div class="main-content">
        <div class="view">
            <header>
                <div id="title" style="color:var(--main); font-size:1.3rem; font-weight:bold;">虛源靈流 — 宇宙一體場域</div>
                <div style="color:#666; font-size:0.8rem;">V.O.F. INFRASTRUCTURE</div>
            </header>
            <div id="scroll-content"></div>
        </div>
    </div>

    <script>
        // Google Apps Script URL
        const URL_GAS = "https://script.google.com/macros/s/AKfycbwAPbQnfTGNXkrqUgvtPv3ZKzdTpWQO5pE_9IqGiZ_lP4eC-XlaMnqXg7ecgEbDag/exec";

        // 標題映射
        const titleMap = {
            'hero': '宇宙場域',
            'ontology': '一體本體論',
            'algorithm': '四筆法演算法',
            'healing': '療癒系統',
            'kernel': '決策引擎',
            'oracle': '答案之書',
            'tarot': '靈流塔羅',
            'daily': '今日建議',
            'diagnosis': '命運診斷',
            'spectrum': '靈流光譜'
        };

        // 切換內容
        async function sw(m) {
            // 更新標題
            document.getElementById('title').innerText = titleMap[m] || '模組';

            // 更新選單狀態
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            event.target.classList.add('active');

            const box = document.getElementById('scroll-content');

            // 根據模組載入內容
            switch(m) {
                case 'hero':
                    renderHero(box);
                    break;
                case 'ontology':
                    renderOntology(box);
                    break;
                case 'algorithm':
                    renderAlgorithm(box);
                    break;
                case 'healing':
                    renderHealing(box);
                    break;
                case 'kernel':
                    renderKernel(box);
                    break;
                case 'oracle':
                case 'tarot':
                case 'daily':
                case 'diagnosis':
                    renderAI(box, m);
                    break;
                case 'spectrum':
                    await renderSpectrum(box);
                    break;
            }
        }

        // Hero 頁面
        function renderHero(box) {
            box.innerHTML = `
                <section class="min-h-screen grid-bg flex items-center justify-center relative overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-b from-zinc-950 via-transparent to-zinc-950 pointer-events-none"></div>
                    <div class="relative z-10 text-center px-6 max-w-4xl">
                        <div class="inline-block mb-8 px-4 py-1 border border-cyan-500/30 text-xs font-mono text-cyan-400 rounded-sm">
                            STATUS: CONDUCTING
                        </div>
                        <h1 class="text-5xl md:text-7xl font-black mb-6 leading-tight">
                            宇宙是<span class="gradient-text">一體場域</span><br>
                            你是<span class="gradient-text">局部振動</span>
                        </h1>
                        <p class="text-zinc-500 text-lg mb-12 font-light">V.O.F. — Vector of Field. METRIC RESET PROTOCOL.</p>
                        <div class="flex flex-wrap justify-center gap-4 text-sm font-mono">
                            <button onclick="sw('ontology')" class="px-6 py-3 border border-zinc-700 hover:border-cyan-500 hover:text-cyan-400 transition-all bg-transparent text-white">開始探索 →</button>
                            <button onclick="sw('kernel')" class="px-6 py-3 bg-cyan-500 hover:bg-cyan-400 text-black font-bold">決策引擎 →</button>
                        </div>
                    </div>
                </section>
            `;
        }

        // 一體本體論
        function renderOntology(box) {
            box.innerHTML = `
                <section class="py-20 px-6">
                    <div class="max-w-7xl mx-auto">
                        <h2 class="text-3xl font-bold mb-6">01. 一體本體論</h2>
                        <div class="h-1 w-20 bg-cyan-500 mb-8"></div>
                        <p class="text-zinc-400 mb-8 leading-relaxed text-lg">
                            所謂時間與空間，僅是粒子視角為了區分場域內的振動差異，而產生的排序與定位工具。你的痛苦，源於你將這些「離散的點」強行縫合成了「因果的線」。
                        </p>
                        <div class="grid md:grid-cols-2 gap-16 items-center">
                            <div>
                                <ul class="space-y-6">
                                    <li class="flex items-start">
                                        <span class="text-cyan-500 mr-4 font-mono text-xl">01</span>
                                        <div>
                                            <strong class="text-white block mb-1 text-lg">場域 (Field)</strong>
                                            <span class="text-zinc-500">全頻共存、座標重疊、無先後性。</span>
                                        </div>
                                    </li>
                                    <li class="flex items-start">
                                        <span class="text-cyan-500 mr-4 font-mono text-xl">02</span>
                                        <div>
                                            <strong class="text-white block mb-1 text-lg">結構 (Metric)</strong>
                                            <span class="text-zinc-500">場域的傳導規則，決定資訊流動的拓樸。</span>
                                        </div>
                                    </li>
                                    <li class="flex items-start">
                                        <span class="text-cyan-500 mr-4 font-mono text-xl">03</span>
                                        <div>
                                            <strong class="text-white block mb-1 text-lg">序列 (Time)</strong>
                                            <span class="text-zinc-500">模式演化的排序標記，而非宇宙背景。</span>
                                        </div>
                                    </li>
                                </ul>
                            </div>
                            <div class="relative aspect-square flex items-center justify-center card-blur rounded-full glow">
                                <svg class="w-2/3 h-2/3 animate-spin-slow" viewBox="0 0 100 100">
                                    <circle cx="50" cy="50" r="48" fill="none" stroke="currentColor" stroke-width="0.1" class="text-cyan-500/30" />
                                    <circle cx="50" cy="50" r="30" fill="none" stroke="currentColor" stroke-width="0.5" stroke-dasharray="2 4" class="text-indigo-500" />
                                    <path d="M50 2 L50 98 M2 50 L98 50" stroke="currentColor" stroke-width="0.1" class="text-cyan-500/50" />
                                    <rect x="35" y="35" width="30" height="30" fill="none" stroke="#22d3ee" stroke-width="0.5" transform="rotate(45 50 50)" />
                                </svg>
                                <div class="absolute text-xs font-mono text-cyan-400 bg-black px-2">ORIGIN AXIS</div>
                            </div>
                        </div>
                    </div>
                </section>
            `;
        }

        // 四筆法演算法
        function renderAlgorithm(box) {
            box.innerHTML = `
                <section class="py-20 px-6">
                    <div class="max-w-7xl mx-auto text-center mb-16">
                        <h2 class="text-3xl font-bold mb-4 uppercase tracking-widest">核心演算法：四筆法</h2>
                        <p class="text-zinc-500">解開粒子態「結構鎖定」的唯一物理儀軌</p>
                    </div>
                    <div class="max-w-7xl mx-auto grid md:grid-cols-4 gap-4">
                        <div class="p-8 card-blur hover:border-cyan-500 transition-all group">
                            <div class="text-cyan-500 font-black text-4xl mb-6 opacity-30 group-hover:opacity-100 transition-opacity">01</div>
                            <h3 class="text-xl font-bold mb-4">見頻 (Seeing)</h3>
                            <p class="text-sm text-zinc-400 leading-relaxed">識別態。將情緒數據化。鎖定當下感覺的幾何特徵，禁止命名與敘事。</p>
                        </div>
                        <div class="p-8 card-blur hover:border-indigo-500 transition-all group">
                            <div class="text-indigo-500 font-black text-4xl mb-6 opacity-30 group-hover:opacity-100 transition-opacity">02</div>
                            <h3 class="text-xl font-bold mb-4">讚頻 (Elevating)</h3>
                            <p class="text-sm text-zinc-400 leading-relaxed">提升態。宣告「感恩讚歎」。利用場域負熵強制拉平局部的結構扭曲。</p>
                        </div>
                        <div class="p-8 card-blur hover:border-purple-500 transition-all group">
                            <div class="text-purple-500 font-black text-4xl mb-6 opacity-30 group-hover:opacity-100 transition-opacity">03</div>
                            <h3 class="text-xl font-bold mb-4">歸靈 (Returning)</h3>
                            <p class="text-sm text-zinc-400 leading-relaxed">回收態。撤銷「過去」座標權重。將能量從虛擬時空點收回到物理載具。</p>
                        </div>
                        <div class="p-8 card-blur hover:border-white transition-all group">
                            <div class="text-white font-black text-4xl mb-6 opacity-30 group-hover:opacity-100 transition-opacity">04</div>
                            <h3 class="text-xl font-bold mb-4">合靈 (Unifying)</h3>
                            <p class="text-sm text-zinc-400 leading-relaxed">圓滿態。觀測者與振動同步消融於場域背景。系統導通，阻抗歸零。</p>
                        </div>
                    </div>
                </section>
            `;
        }

        // 療癒系統
        function renderHealing(box) {
            box.innerHTML = `
                <section class="py-20 px-6 relative overflow-hidden">
                    <div class="max-w-7xl mx-auto relative z-10">
                        <h2 class="text-3xl font-bold mb-16 text-center">療癒操作系統 (HOS)</h2>
                        <div class="flex flex-col md:flex-row items-center justify-between gap-12">
                            <div class="flex-1 card-blur p-10 border-l-4 border-l-red-500">
                                <h3 class="text-red-500 font-bold mb-4 uppercase text-sm tracking-widest font-mono">舊系統 (因果鏈)</h3>
                                <div class="space-y-4 text-zinc-500 line-through decoration-red-900">
                                    <p>發生挫折 → 我感到痛苦</p>
                                    <p>因為痛苦 → 我必須改變環境</p>
                                    <p>若環境不變 → 我的人生是失敗的</p>
                                </div>
                            </div>
                            <div class="hidden md:block">
                                <svg class="w-12 h-12 text-zinc-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7" />
                                </svg>
                            </div>
                            <div class="flex-1 card-blur p-10 border-l-4 border-l-cyan-500 glow">
                                <h3 class="text-cyan-500 font-bold mb-4 uppercase text-sm tracking-widest font-mono">V.O.F. 系統 (斷鏈)</h3>
                                <div class="space-y-4 text-zinc-300">
                                    <p>發生事件 [位置 A]</p>
                                    <p>出現感受 [位置 B]</p>
                                    <p><strong>禁止連結：</strong>位置 B 獨立進行四筆法轉化</p>
                                    <p><strong>結果：</strong>內在導通，外在事務照常執行</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            `;
        }

        // 決策引擎
        function renderKernel(box) {
            box.innerHTML = `
                <section class="py-20 px-6">
                    <div class="max-w-4xl mx-auto card-blur p-12 border border-zinc-700 relative">
                        <div class="absolute -top-4 left-1/2 -translate-x-1/2 bg-zinc-950 px-6 py-2 border border-zinc-700 text-xs font-mono text-cyan-400">
                            ACTION KERNEL v1.0
                        </div>
                        <h2 class="text-4xl font-black mb-10 text-center">主位無概念決策</h2>
                        <div class="grid md:grid-cols-3 gap-8 text-center">
                            <div>
                                <div class="text-zinc-600 mb-2 font-mono">STEP 01</div>
                                <div class="font-bold text-white mb-2">刪除解釋</div>
                                <div class="text-xs text-zinc-500 leading-relaxed text-balance">移除「為什麼要做」的所有邏輯理由</div>
                            </div>
                            <div>
                                <div class="text-zinc-600 mb-2 font-mono">STEP 02</div>
                                <div class="font-bold text-white mb-2">撤銷動機</div>
                                <div class="text-xs text-zinc-500 leading-relaxed text-balance">不以改變、慈悲、成就感為動力</div>
                            </div>
                            <div>
                                <div class="text-zinc-600 mb-2 font-mono">STEP 3</div>
                                <div class="font-bold text-white mb-2">直接輸出</div>
                                <div class="text-xs text-zinc-500 leading-relaxed text-balance">讓行為在無中介的狀態下自發顯現</div>
                            </div>
                        </div>
                        <div class="mt-12 p-6 bg-zinc-900/50 rounded-sm border-l-2 border-cyan-500 text-sm font-light italic text-zinc-400">
                            " 行為不再是被選中的，而是當干擾消失後，環境結構壓力和內在流向產生的唯一合力輸出。 "
                        </div>
                    </div>
                </section>
            `;
        }

        // AI 功能模組
        function renderAI(box, type) {
            const actionMap = {
                'oracle': 'getOracle',
                'tarot': 'getTarot',
                'daily': 'getDaily',
                'diagnosis': 'getDiagnosis'
            };
            const action = actionMap[type];
            const title = titleMap[type];

            box.innerHTML = `
                <section class="py-20 px-6 text-center">
                    <div class="max-w-2xl mx-auto">
                        <h2 class="text-3xl font-bold mb-4 gradient-text">${title}</h2>
                        <p class="text-zinc-500 mb-12">正在同步阿卡西數據...</p>
                        <button class="ai-button" onclick="triggerAI('${action}')">
                            ◈ 感應當下頻率 ◈
                        </button>
                        <div id="ai-result-box"></div>
                    </div>
                </section>
            `;
        }

        // 觸發 AI
        async function triggerAI(action) {
            const box = document.getElementById('ai-result-box');
            box.innerHTML = '<div class="text-zinc-500 mt-8">正在校準頻率...</div>';

            try {
                const res = await fetch(URL_GAS + '?action=' + action);
                const data = await res.json();
                box.innerHTML = `<div class="ai-result">${data.reply}</div>`;
            } catch (e) {
                box.innerHTML = `<div class="ai-result" style="border-color:#f00;">連接失敗，請稍後再試。<br><small>${e.message}</small></div>`;
            }
        }

        // 靈流光譜
        async function renderSpectrum(box) {
            box.innerHTML = '<div class="text-zinc-500 text-center py-20">正在同步靈流光譜...</div>';

            try {
                const res = await fetch(URL_GAS + '?action=getList');
                const data = await res.json();

                let html = '<section class="py-20 px-6"><div class="max-w-2xl mx-auto"><h2 class="text-3xl font-bold mb-8 text-center gradient-text">靈流光譜</h2>';
                data.list.forEach(n => {
                    html += `<div class="spectrum-item" onclick="loadSpectrum('${n}')">◈ ${n}</div>`;
                });
                html += '</div></section>';
                box.innerHTML = html;
            } catch (e) {
                box.innerHTML = `<div class="text-center py-20 text-red-500">載入失敗<br><small>${e.message}</small></div>`;
            }
        }

        async function loadSpectrum(name) {
            const box = document.getElementById('scroll-content');
            box.innerHTML = '<div class="text-zinc-500 text-center py-20">載入中...</div>';

            try {
                const res = await fetch(URL_GAS + '?action=getContent&folder=' + name);
                const data = await res.json();
                box.innerHTML = `<section class="py-20 px-6"><div class="content-body">${data.reply}</div></section>`;
            } catch (e) {
                box.innerHTML = `<div class="text-center py-20 text-red-500">載入失敗<br><small>${e.message}</small></div>`;
            }
        }

        // 星空背景動畫
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function createStars() {
            stars = [];
            for (let i = 0; i < 200; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speed: Math.random() * 0.5 + 0.1
                });
            }
        }

        function animateStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            stars.forEach(star => {
                ctx.globalAlpha = Math.random() * 0.5 + 0.3;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                star.y += star.speed;
                if (star.y > canvas.height) star.y = 0;
            });
            requestAnimationFrame(animateStars);
        }

        resizeCanvas();
        createStars();
        animateStars();
        window.addEventListener('resize', () => { resizeCanvas(); createStars(); });

        // 初始載入 Hero
        document.addEventListener('DOMContentLoaded', () => {
